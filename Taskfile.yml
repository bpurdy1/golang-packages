version: '3'

tasks:
  add-package:
    desc: "Add a new package to release-please. Usage: task add-package -- middleware/jwt-middleware"
    requires:
      vars: [CLI_ARGS]
    cmds:
      - jq '.packages["{{.CLI_ARGS}}"] = .packages[.packages | keys[0]]' release-please-config.json > tmp.json && mv tmp.json release-please-config.json
      - jq '.["{{.CLI_ARGS}}"] = "0.0.0"' .release-please-manifest.json > tmp.json && mv tmp.json .release-please-manifest.json
      - echo "Added {{.CLI_ARGS}}"
